services:
  app:
    build:
      context: .
    working_dir: /app
    volumes:
      - .:/app
      - composer-cache:/tmp/composer-cache
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    ports:
      - "8080:8080"
    command: sh -lc "git config --global --add safe.directory /app && composer install && php -S 0.0.0.0:8080 -t public"

  test:
    build:
      context: .
    working_dir: /app
    volumes:
      - .:/app
      - composer-cache:/tmp/composer-cache
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    command: sh -lc "git config --global --add safe.directory /app && composer install && composer test"

volumes:
  composer-cache:
