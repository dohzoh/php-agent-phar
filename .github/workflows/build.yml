name: Build & Release

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: php:${{ matrix.php }}-cli-alpine

    strategy:
      max-parallel: 3
      matrix:
        php: ["8.1", "8.2", "8.3", "8.4"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: apk add --no-cache bash curl git unzip

      - name: Install Composer
        run: |
          php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
          php composer-setup.php --install-dir=/usr/local/bin --filename=composer
          rm composer-setup.php

      - name: Validate composer
        run: composer validate --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: /tmp/composer-cache
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: |
          composer config --global cache-dir /tmp/composer-cache
          composer install --prefer-dist --no-progress

      - name: Run tests
        run: composer test

  build:
    needs: test
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: php:8.1-cli-alpine

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: apk add --no-cache bash curl git unzip

      - name: Install Composer
        run: |
          php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
          php composer-setup.php --install-dir=/usr/local/bin --filename=composer
          rm composer-setup.php

      - name: Install dependencies
        run: |
          composer config --global cache-dir /tmp/composer-cache
          composer install --prefer-dist --no-progress

      - name: Build PHAR
        run: php -d phar.readonly=0 build.php

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-agent.phar
          path: php-agent.phar

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    container:
      image: php:8.1-cli-alpine

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: apk add --no-cache bash curl git unzip

      - name: Install Composer
        run: |
          php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
          php composer-setup.php --install-dir=/usr/local/bin --filename=composer
          rm composer-setup.php

      - name: Install dependencies
        run: |
          composer config --global cache-dir /tmp/composer-cache
          composer install --prefer-dist --no-progress --no-dev

      - name: Build PHAR
        run: php -d phar.readonly=0 build.php

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          files: php-agent.phar
